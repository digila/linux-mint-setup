# ============================================================
# Starship 設定 (PHP/Laravel + Node/TS + Python 開発者向け)
# このファイルは ~/.config/starship.toml からシンボリックリンクされます
# 編集すると即座に反映されます (再起動不要)
# ============================================================

format = """
$directory\
$git_branch\
$git_status\
$fill\
$php\
$nodejs\
$python\
$cmd_duration\
$line_break\
$character"""

add_newline = true
command_timeout = 1000

[directory]
truncation_length = 4
truncate_to_repo = true
style = "bold cyan"
format = "[$path]($style)[$read_only]($read_only_style) "
read_only = " 🔒"

[git_branch]
symbol = " "
style = "bold purple"
format = "[$symbol$branch]($style) "

[git_status]
style = "bold yellow"
format = '([\[$all_status$ahead_behind\]]($style) )'
conflicted = "="
ahead      = "⇡${count}"
behind     = "⇣${count}"
diverged   = "⇕⇡${ahead_count}⇣${behind_count}"
up_to_date = ""
untracked  = "?${count}"
stashed    = "$"
modified   = "!${count}"
staged     = "+${count}"
renamed    = "»${count}"
deleted    = "✘${count}"

[fill]
symbol = " "

[php]
symbol = " "
format = "[$symbol$version]($style) "
style = "147"
detect_files = ["composer.json", ".php-version"]
detect_extensions = ["php"]

[nodejs]
symbol = " "
format = "[$symbol$version]($style) "
style = "bold green"
detect_files = ["package.json", ".nvmrc", ".node-version"]
detect_extensions = ["js", "mjs", "cjs", "ts", "tsx", "jsx"]

[python]
symbol = " "
format = '[${symbol}${pyenv_prefix}${version}( \($virtualenv\))]($style) '
style = "bold yellow"
detect_files = ["requirements.txt", "pyproject.toml", ".python-version", "Pipfile"]
detect_extensions = ["py"]

[cmd_duration]
min_time = 2_000
format = "[󰔟 $duration](yellow) "

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold green)"

[package]
disabled = true
[aws]
disabled = true
[gcloud]
disabled = true
[kubernetes]
disabled = false
